apiVersion: v1
kind: ConfigMap
metadata:
  name: service-config
  namespace: zomato
  labels:
    app.kubernetes.io/name: zomato
    app.kubernetes.io/part-of: zomato-clone
data:
  # Service URLs (for internal service discovery)
  USER_SERVICE_URL: "http://user-service:3000"
  RESTAURANT_SERVICE_URL: "http://restaurant-service:3000"
  ORDER_SERVICE_URL: "http://order-service:3000"
  PAYMENT_SERVICE_URL: "http://payment-service:3000"
  DELIVERY_SERVICE_URL: "http://delivery-service:3000"
  
  # Environment
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  
  # Frontend Configuration
  REACT_APP_API_URL: "https://api.zomato.yourdomain.com"
  
  # Ingress Configuration for EKS
  INGRESS_CLASS: "alb"
  FRONTEND_HOST: "zomato.yourdomain.com"
  API_HOST: "api.zomato.yourdomain.com"
  GRAFANA_HOST: "grafana.zomato.yourdomain.com"
  PROMETHEUS_HOST: "prometheus.zomato.yourdomain.com"
  
  # Monitoring
  PROMETHEUS_URL: "http://prometheus:9090"
  GRAFANA_URL: "http://grafana:3000"
