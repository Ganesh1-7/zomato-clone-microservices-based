apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zomato-ingress
  namespace: zomato
  annotations:
    # AWS Application Load Balancer (ALB) Ingress Controller annotations
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/health-check-path: /health
    alb.ingress.kubernetes.io/health-check-interval-seconds: "30"
    alb.ingress.kubernetes.io/health-check-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    
    # SSL/TLS settings
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:AWS_ACCOUNT_ID:certificate/CERTIFICATE_ID
    
    # Security groups
    alb.ingress.kubernetes.io/security-groups: SECURITY_GROUP_ID
    
    # Enable access logs
    alb.ingress.kubernetes.io/access-logging-enabled: "true"
    
    # Backend protocol
    alb.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: alb
  rules:
  - host: zomato.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  - host: api.zomato.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 80
---
# TLS Secret for HTTPS
apiVersion: v1
kind: Secret
metadata:
  name: zomato-tls-secret
  namespace: zomato
type: kubernetes.io/tls
data:
  # Base64 encoded certificate and key (replace with real values)
  # Run: cat cert.pem | base64 -w0
  # Run: cat key.pem | base64 -w0
  tls.crt: REPLACE_WITH_BASE64_CERT
  tls.key: REPLACE_WITH_BASE64_KEY
