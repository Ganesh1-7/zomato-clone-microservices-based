apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zomato-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # For AWS Application Load Balancer (ALB) uncomment below:
    # alb.ingress.kubernetes.io/scheme: internet-facing
    # alb.ingress.kubernetes.io/target-type: ip
    # alb.ingress.kubernetes.io/health-check-path: /health
spec:
  tls:
  - hosts:
    - zomato.yourdomain.com
    - api.zomato.yourdomain.com
    - grafana.zomato.yourdomain.com
    - prometheus.zomato.yourdomain.com
    secretName: zomato-tls-secret
  rules:
  - host: zomato.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  - host: api.zomato.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 80
  - host: grafana.zomato.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
  - host: prometheus.zomato.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090
---
# TLS Secret for HTTPS (create manually with your certificate)
# kubectl create secret tls zomato-tls-secret --cert=path/to/cert.pem --key=path/to/key.pem
apiVersion: v1
kind: Secret
metadata:
  name: zomato-tls-secret
  namespace: default
type: kubernetes.io/tls
data:
  # Base64 encoded certificate and key (replace with real values)
  # Run: cat cert.pem | base64 -w0
  # Run: cat key.pem | base64 -w0
  tls.cert: REPLACE_WITH_BASE64_CERT
  tls.key: REPLACE_WITH_BASE64_KEY
