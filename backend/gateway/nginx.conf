events {
    worker_connections 1024;
}

http {
    # Inline MIME types to avoid dependency on external file
    types {
        text/html                             html htm shtml;
        text/css                            css;
        text/xml                            xml;
        image/gif                           gif;
        image/jpeg                         jpeg jpg;
        application/javascript             js;
        application/atom+xml              atom;
        application/rss+xml               rss;
        text/mathml                         mml;
        text/plain                         txt;
        text/vnd.sun.j2me.app-descriptor   jad;
        text/vnd.wap.wml                   wml;
        text/x-component                   htc;
        image/png                          png;
        image/tiff                         tif tiff;
        image/vnd.wap.wbmp                 wbmp;
        image/x-icon                       ico;
        image/x-jng                        jng;
        image/x-ms-bmp                     bmp;
        image/svg+xml                      svg svgz;
        image/webp                         webp;
        application/font-woff              woff;
        application/java-archive           jar war ear;
        application/json                   json;
        application/mac-binhex40           hqx;
        application/msword                  doc;
        application/pdf                     pdf;
        application/postscript              ps eps ai;
        application/rtf                     rtf;
        application/vnd.ms-excelsheet       xls;
        application/vnd.ms-powerpoint       ppt;
        application/vnd.wap.wmlc          wmlc;
        application/vnd.google-earth.kml    kml;
        application/vnd.google-earth.kmz    kmz;
        application/x-7z-compressed         7z;
        application/x-cocoa                 cco;
        application/x-java-archive-diff     jardiff;
        application/x-java-archive-nogdeps  jar;
        application/x-makeself              run;
        application/x-perl                 pl pm;
        application/x-pkg                   deb pkg;
        application/x-rar-compressed        rar;
        application/x-redhat-rpm-config     rpm;
        application/x-sea                   sea;
        application/x-shockwave-flash       swf;
        application/x-stuffit              sit;
        application/x-tcl                   tcl tk;
        application/x-x509-ca-cert          der cert pem;
        application/x-xpinstall             xpi;
        application/xhtml+xml              xhtml;
        application/xspf+xml                xspf;
        application/zip                     zip;
        application/octet-stream            bin exe dll;
        application/octet-stream            deb;
        application/octet-stream            dmg;
        application/octet-stream            iso img;
        application/octet-stream            msi msp msm;
        audio/midi                         mid midi kar;
        audio/mpeg                         mp3;
        audio/ogg                           ogg;
        audio/x-m4a                        m4a;
        audio/x-realaudio                  ra;
        video/3gpp                         3gpp 3gp;
        video/mp2t                         ts;
        video/mp4                          mp4;
        video/mpeg                         mpeg mpg;
        video/quicktime                     mov;
        video/webm                         webm;
        video/x-flv                         flv;
        video/x-m4v                        m4v;
        video/x-msvideo                     avi;
    }
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # JSON log format for Loki ingestion
    log_format loki_json escape=json '{ '
        '"timestamp": "$time_iso8601", '
        '"source": "nginx", '
        '"service": "api-gateway", '
        '"level": "info", '
        '"remote_addr": "$remote_addr", '
        '"method": "$request_method", '
        '"uri": "$request_uri", '
        '"status": $status, '
        '"response_time": $request_time, '
        '"upstream": "$upstream_addr", '
        '"upstream_response_time": "$upstream_response_time", '
        '"body_bytes_sent": $body_bytes_sent, '
        '"http_referer": "$http_referer", '
        '"http_user_agent": "$http_user_agent" '
    '}';

    access_log /var/log/nginx/access.log loki_json;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    upstream user_service {
        server user-service:3000;
    }

    upstream restaurant_service {
        server restaurant-service:3000;
    }

    upstream order_service {
        server order-service:3000;
    }

    upstream delivery_service {
        server delivery-service:3000;
    }

    upstream payment_service {
        server payment-service:3000;
    }

    server {
        listen 80;
        server_name localhost;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-User-Id' always;

        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-User-Id';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        location /api/users/ {
            proxy_pass http://user_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/restaurants/ {
            proxy_pass http://restaurant_service/api/restaurants/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/cuisines {
            proxy_pass http://restaurant_service/api/cuisines;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/categories {
            proxy_pass http://restaurant_service/api/categories;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/cart/ {
            proxy_pass http://order_service/api/cart/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/orders/ {
            proxy_pass http://order_service/api/orders/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/orders {
            proxy_pass http://order_service/api/orders;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/deliveries/ {
            proxy_pass http://delivery_service/api/deliveries/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/tracking/ {
            proxy_pass http://delivery_service/api/tracking/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/payments/ {
            proxy_pass http://payment_service/api/payments/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/payments {
            proxy_pass http://payment_service/api/payments;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            access_log off;
            return 200 '{"status":"UP","service":"api-gateway"}';
            add_header Content-Type application/json;
        }
    }
}

